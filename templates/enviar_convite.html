{% extends "base.html" %}

{% block title %}Enviar Convite{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h2 class="card-title mb-4">Enviar Convite</h2>

                <p><strong>Liderança:</strong> {{ cabo[1] }}</p>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do apoiador</label>
                        <input type="text" name="nome_apoiador" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail do apoiador</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone / WhatsApp</label>
                        <input type="text"
                            name="telefone"
                            class="form-control"
                            placeholder="Ex: 61999999999">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Enviar Convite</button>
                        <a href="{{ url_for('listar') }}" class="btn btn-secondary">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
