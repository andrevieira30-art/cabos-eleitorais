{% extends "base.html" %}

{% block title %}Cadastrar Usuário{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h2 class="card-title mb-4">Cadastrar Usuário</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Acesso</label>
                        <select name="tipo_acesso" class="form-select" required>
                            <option value="">Selecione</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="DEPUTADO">DEPUTADO</option>
                            <option value="CHEFE_GABINETE">CHEFE_GABINETE</option>
                            <option value="SECRETARIA">SECRETARIA</option>
                            <option value="CABO">LIDER</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Liderança vinculada (apenas para Apoiadores)</label>
                        <select name="cabo_id" class="form-select">
                            <option value="">Nenhuma</option>
                            {% for cabo in cabos %}
                                <option value="{{ cabo[0] }}">{{ cabo[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ativo</label>
                        <select name="ativo" class="form-select">
                            <option value="S">Sim</option>
                            <option value="N">Não</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Salvar</button>
                        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
